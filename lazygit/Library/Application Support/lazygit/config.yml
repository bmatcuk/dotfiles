git:
  parseEmoji: true
  commitPrefix:
    - pattern: "([A-Z]+-[0-9]+)"
      replace: "[$1] "

os:
  editPreset: 'nvim'

gui:
  scrollHeight: 10
  tabWidth: 2
  nerdFontsVersion: 3

  # catppuccin frappe with mocha surfaces and base
  theme:
    activeBorderColor:
      - '#8caaee'
      - bold
    inactiveBorderColor:
      - '#a5adce'
    searchingActiveBorderColor:
      - '#e5c890'
    optionsTextColor:
      - '#8caaee'
    selectedLineBgColor:
      - '#313244'
    inactiveViewSelectedLineBgColor:
      - '#737994'
    cherryPickedCommitFgColor:
      - '#8caaee'
    cherryPickedCommitBgColor:
      - '#45475a'
    markedBaseCommitFgColor:
      - '#8caaee'
    markedBaseCommitBgColor:
      - '#e5c890'
    unstagedChangesColor:
      - '#e78284'
    defaultFgColor:
      - '#c6d0f5'

  authorColors:
    '*': '#babbf1'
